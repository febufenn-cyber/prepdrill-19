name: Phase 1 truth layer

on:
  pull_request:
  push:
    branches:
      - agent/phase-1-truth-layer

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit and integration tests
        shell: bash
        run: |
          status=0
          python -m unittest discover -s tests -p 'test_phase1*.py' -v > /tmp/phase1-tests.log 2>&1 || status=$?
          if [ "$status" -ne 0 ]; then
            echo "Phase 1 test failure summary:"
            tail -n 14 /tmp/phase1-tests.log
          else
            tail -n 5 /tmp/phase1-tests.log
          fi
          exit "$status"
      - name: Parse contracts
        run: |
          python - <<'PY'
          import json
          for path in [
              'schemas/question.v1.schema.json',
              'taxonomy/paper1.v1.json',
              'data/golden-set/manifest.v1.json',
          ]:
              with open(path, encoding='utf-8') as handle:
                  json.load(handle)
              print('parsed', path)
          PY
      - name: CLI smoke test
        run: |
          python -m prepdrill_content --db /tmp/prepdrill.sqlite3 init-db
          python -m prepdrill_content --db /tmp/prepdrill.sqlite3 load-taxonomy taxonomy/paper1.v1.json
          python -m prepdrill_content --db /tmp/prepdrill.sqlite3 import tests/fixtures/phase1_valid.jsonl --source-document-id fixture-doc-001
          python -m prepdrill_content --db /tmp/prepdrill.sqlite3 readiness-report
