name: Phase 7 mock exam

on:
  pull_request:
  push:
    branches:
      - agent/phase-7-mock-exam

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 7 evaluator
        run: python -m prepdrill_content.phase7
      - name: Contract presence
        run: |
          test -s PHASE_7_BUILD_CONTRACT.md
          test -s docs/phase-7/BLIND_SPOTS.md
          test -s docs/phase-7/EVALUATOR_SPEC.md
          test -s docs/phase-7/PHASE_7_EXIT_CHECKLIST.md
          test -s supabase/migrations/008_phase7_mock_exam.sql
