name: Phase 8 quality security

on:
  pull_request:
  push:
    branches:
      - agent/phase-8-quality-security

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 8 evaluator
        run: python -m prepdrill_content.phase8
      - name: Contract presence
        run: |
          test -s PHASE_8_BUILD_CONTRACT.md
          test -s docs/phase-8/BLIND_SPOTS.md
          test -s docs/phase-8/EVALUATOR_SPEC.md
          test -s docs/phase-8/PHASE_8_EXIT_CHECKLIST.md
          test -s supabase/migrations/009_phase8_quality.sql
