name: Phase 6 adaptive calibration

on:
  pull_request:
  push:
    branches:
      - agent/phase-6-adaptive-calibration

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 6 evaluator
        run: python -m prepdrill_content.phase6
      - name: Contract presence
        run: |
          test -s PHASE_6_BUILD_CONTRACT.md
          test -s docs/phase-6/BLIND_SPOTS.md
          test -s docs/phase-6/EVALUATOR_SPEC.md
          test -s docs/phase-6/PHASE_6_EXIT_CHECKLIST.md
          test -s supabase/migrations/007_phase6_adaptive.sql
