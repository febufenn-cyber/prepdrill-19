name: Phase 10 billing safety

on:
  pull_request:
  push:
    branches:
      - agent/phase-10-billing-safety

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 10 evaluator
        run: python -m prepdrill_content.phase10
      - name: Contract presence
        run: |
          test -s PHASE_10_BUILD_CONTRACT.md
          test -s docs/phase-10/BLIND_SPOTS.md
          test -s docs/phase-10/EVALUATOR_SPEC.md
          test -s docs/phase-10/PHASE_10_EXIT_CHECKLIST.md
          test -s supabase/migrations/011_phase10_billing.sql
