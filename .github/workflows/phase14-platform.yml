name: Phase 14 platform expansion

on:
  pull_request:
  push:
    branches:
      - agent/phase-14-platform-expansion

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 14 evaluator
        run: python -m prepdrill_content.phase14
      - name: Contract presence
        run: |
          test -s PHASE_14_BUILD_CONTRACT.md
          test -s docs/phase-14/BLIND_SPOTS.md
          test -s docs/phase-14/EVALUATOR_SPEC.md
          test -s docs/phase-14/PHASE_14_EXIT_CHECKLIST.md
          test -s supabase/migrations/015_phase14_platform.sql
