name: Phase 11 growth attribution

on:
  pull_request:
  push:
    branches:
      - agent/phase-11-growth-attribution

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 11 evaluator
        run: python -m prepdrill_content.phase11
      - name: Contract presence
        run: |
          test -s PHASE_11_BUILD_CONTRACT.md
          test -s docs/phase-11/BLIND_SPOTS.md
          test -s docs/phase-11/EVALUATOR_SPEC.md
          test -s docs/phase-11/PHASE_11_EXIT_CHECKLIST.md
          test -s supabase/migrations/012_phase11_growth.sql
