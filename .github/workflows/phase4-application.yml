name: Phase 4 application identity

on:
  pull_request:
  push:
    branches:
      - agent/phase-4-application-identity

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 4 evaluator
        run: python -m prepdrill_content.phase4
      - name: Contract presence
        run: |
          test -s PHASE_4_BUILD_CONTRACT.md
          test -s docs/phase-4/BLIND_SPOTS.md
          test -s docs/phase-4/EVALUATOR_SPEC.md
          test -s docs/phase-4/PHASE_4_EXIT_CHECKLIST.md
          test -s supabase/migrations/005_phase4_application_identity.sql
