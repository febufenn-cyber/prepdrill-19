name: Phase 5 grounded explanations

on:
  pull_request:
  push:
    branches:
      - agent/phase-5-grounded-explanations

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 5 evaluator
        run: python -m prepdrill_content.phase5
      - name: Contract presence
        run: |
          test -s PHASE_5_BUILD_CONTRACT.md
          test -s docs/phase-5/BLIND_SPOTS.md
          test -s docs/phase-5/EVALUATOR_SPEC.md
          test -s docs/phase-5/PHASE_5_EXIT_CHECKLIST.md
          test -s supabase/migrations/006_phase5_explanations.sql
