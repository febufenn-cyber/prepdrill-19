name: Phase 2 learner runtime

on:
  pull_request:
  push:
    branches:
      - agent/phase-2-runtime-evaluator

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Parse Phase 2 JSON contracts
        run: |
          python - <<'PY'
          import json
          for path in [
              'schemas/phase2-evaluation.v1.schema.json',
              'schemas/drill-session.v1.schema.json',
          ]:
              with open(path, encoding='utf-8') as handle:
                  json.load(handle)
              print('parsed', path)
          PY
      - name: Run adversarial evaluator
        run: python -m prepdrill_content phase2-evaluate
