name: Phase 9 retention communication

on:
  pull_request:
  push:
    branches:
      - agent/phase-9-retention-communication

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 9 evaluator
        run: python -m prepdrill_content.phase9
      - name: Contract presence
        run: |
          test -s PHASE_9_BUILD_CONTRACT.md
          test -s docs/phase-9/BLIND_SPOTS.md
          test -s docs/phase-9/EVALUATOR_SPEC.md
          test -s docs/phase-9/PHASE_9_EXIT_CHECKLIST.md
          test -s supabase/migrations/010_phase9_retention.sql
