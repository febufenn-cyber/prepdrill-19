name: Phase 12 institute console

on:
  pull_request:
  push:
    branches:
      - agent/phase-12-institute-console

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full regression suite
        run: python -m unittest discover -s tests -v
      - name: Compile package
        run: python -m compileall -q prepdrill_content tests
      - name: Phase 12 evaluator
        run: python -m prepdrill_content.phase12
      - name: Contract presence
        run: |
          test -s PHASE_12_BUILD_CONTRACT.md
          test -s docs/phase-12/BLIND_SPOTS.md
          test -s docs/phase-12/EVALUATOR_SPEC.md
          test -s docs/phase-12/PHASE_12_EXIT_CHECKLIST.md
          test -s supabase/migrations/013_phase12_institute.sql
